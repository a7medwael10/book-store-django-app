{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Author{% endblock %}
{% block app_css %}<link rel="stylesheet" href="{% static 'authors/css/style.css' %}">{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">Edit Author</h1>
        <p class="text-muted">{{ author.name }}</p>
        <form action="{% url 'authors.edit' author.id %}" method="post" novalidate>
          {% csrf_token %}
          {% include 'authors/partials/form_fields.html' with form=form %}
          <div class="d-flex gap-2">
            <button class="btn btn-warning" type="submit">Update</button>
            <a href="{% url 'authors.show' author.id %}" class="btn btn-outline-secondary">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
