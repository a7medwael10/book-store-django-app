{% extends 'base.html' %}

{% block title %}Delete Author{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 text-danger mb-3">Delete Author</h1>
        <p class="mb-4">Are you sure you want to delete <strong>{{ author.name }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button class="btn btn-danger" type="submit">Delete</button>
            <a href="{% url 'authors.show' author.id %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
