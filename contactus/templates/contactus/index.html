{% extends 'base.html' %}
{% load static %}

{% block title %}Contact Us{% endblock %}
{% block app_css %}<link rel="stylesheet" href="{% static 'contactus/css/style.css' %}">{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Contact Us</h1>
        <p class="text-muted">This is a demo form UI.</p>
        <form>
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" placeholder="Your name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" placeholder="Write your message..."></textarea>
          </div>
          <button type="button" class="btn btn-primary">Send (Demo)</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
